name: Python Tests

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Generate nightly insights
        run: python scripts/generate_insights.py

      - name: Upload nightly insights artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-insights
          path: data/validation/nightly_insights.md
