name: Python Tests

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --json-report --json-report-file=data/validation/pytest_report.json

      - name: Write test summary
        run: python scripts/write_test_summary.py

      - name: Generate nightly insights
        run: python scripts/generate_insights.py

      - name: Generate daily review
        run: python scripts/generate_daily_review.py

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: |
            data/validation/pytest_report.json
            data/validation/test_summary.json
            data/validation/nightly_insights.md
            data/validation/daily_review.md
